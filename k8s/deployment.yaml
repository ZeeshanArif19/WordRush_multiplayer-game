apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordrush-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordrush-backend
  template:
    metadata:
      labels:
        app: wordrush-backend
    spec:
      containers:
      - name: backend
        image: zeeshanarif19/wordrush-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "150Mi"
            cpu: "200m"
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: wordrush-config
              key: PORT
        - name: ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: wordrush-config
              key: ALLOWED_ORIGINS
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: wordrush-secrets
              key: DATABASE_URL
        # Health check to ensure k3s knows when the app is ready
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 5
